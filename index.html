<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogos ONLINE</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    height: 100vh;
    display: flex;
    background-image: url('fundo.jpg');
    background-size: 100px; /* Tamanho do padrão de repetição (imagem de fundo) */
    background-repeat: repeat;
    background-position: center;
    background-attachment: fixed;
}

/* MENU LATERAL */
.sidebar{
    width: 280px;
    background: rgba(20,20,20,0.95);
    color: white;
    padding: 25px;
    overflow-y: auto;
}

.sidebar h1{
    margin-bottom: 25px;
    text-align: center;
    font-size: 2rem;
}

.sidebar button{
    width: 100%;
    padding: 15px;
    margin-bottom: 12px;
    border: none;
    border-radius: 10px;
    background: aquamarine;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar button:hover{
    transform: scale(1.03);
    background: #5fffd2;
}

/* ÁREA DO JOGO */
.main{
    flex: 1;
    padding: 20px;
}

.game-container{
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(5px);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.game-container iframe{
    width: 100%;
    height: 100%;
    border: none;
}

/* RESPONSIVIDADE */
@media (max-width: 900px){

    body{
        flex-direction: column;
    }

    .sidebar{
        width: 100%;
        height: auto;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        padding: 10px;
        gap: 10px;
    }

    .sidebar h1{
        width: 100%;
        font-size: 1.5rem;
        margin-bottom: 5px;
    }

    .sidebar button{
        width: calc(50% - 10px);
        padding: 12px;
        font-size: 0.95rem;
    }

    .main{
        height: auto;
        padding: 10px;
    }

    .game-container{
        height: calc(100dvh - 220px); /* aumenta espaço para o jogo */
        border-radius: 15px;
    }
}

/* CELULARES MUITO PEQUENOS */
@media (max-width: 500px){
    .sidebar button{
        width: 100%;
    }

    .game-container{
        height: calc(100dvh - 420px);
    }
}
</style>

<script>
function abrirJogo(url){
    const container = document.getElementById("jogo");

    // verifica se o jogo já está aberto
    if(container.dataset.jogo === url){
        // fecha o jogo
        container.innerHTML = "";
        container.dataset.jogo = "";
    } else {
        // ajusta escala no mobile sem tocar no PC
        const escala = window.innerWidth < 900 ? "scale(1.2)" : "scale(1)";
        const width = window.innerWidth < 900 ? "83%" : "100%";
        const height = window.innerWidth < 900 ? "83%" : "100%";

        // abre o novo jogo
        container.innerHTML = `
            <iframe src="${url}"
                style="
                    transform:${escala};
                    transform-origin: top left;
                    width:${width};
                    height:${height};
                    border:none;
                ">
            </iframe>
        `;
        container.dataset.jogo = url;
    }
}
</script>

</head>
<body>

<div class="sidebar">

    <h1>MEUS JOGOS</h1>

    <button onclick="abrirJogo('amogus/amogus.html')">
        Amogus
    </button>

    <button onclick="abrirJogo('sapo/sapo.html')">
        Sapo
    </button>

    <button onclick="abrirJogo('jogos simples/nave.html')">
        Nave Espacial
    </button>
    
    <button onclick="abrirJogo('jogos simples/jogo_da_velha.html')">
        Jogo da Velha
    </button>

    <button onclick="abrirJogo('jogos simples/transformador.html')">
        Transformador de Imagens
    </button>

    <button onclick="abrirJogo('jogos simples/gerador_de_qrcode.html')">
        Gerador de QRCode
    </button>

    <button onclick="abrirJogo('jogos simples/damas.html')">
        Damas
    </button>

    <button onclick="abrirJogo('jogos simples/chuva_verde.html')">
        Chuva verde
    </button>

    <button onclick="abrirJogo('jogos simples/queda.html')">
        Queda
    </button>

    <button onclick="abrirJogo('jogos simples/portas_logicas.html')">
        Portas Lógicas
    </button>
    
</div>

<div class="main">
    <div class="game-container" id="jogo" data-jogo="">
    </div>
</div>

</body>
</html>
