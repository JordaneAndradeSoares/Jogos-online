<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jogos ONLINE</title>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    height: 100vh;
    display: flex;
    background-image: url('fundo.jpg');
    background-size: 100px; /* Tamanho do padrão de repetição (imagem de fundo) */
    background-repeat: repeat;
    background-position: center;
    background-attachment: fixed;
}

/* MENU LATERAL */
.sidebar{
    width: 280px;
    background: rgba(20,20,20,0.95);
    color: white;
    padding: 25px;
    overflow-y: auto;
}

.sidebar h1{
    margin-bottom: 25px;
    text-align: center;
    font-size: 2rem;
}

.sidebar button{
    width: 100%;
    padding: 15px;
    margin-bottom: 12px;
    border: none;
    border-radius: 10px;
    background: aquamarine;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar button:hover{
    transform: scale(1.03);
    background: #5fffd2;
}

/* ÁREA DO JOGO */
.main{
    flex: 1;
    padding: 20px;
}

.game-container{
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(5px);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.game-container iframe{
    width: 100%;
    height: 100%;
    border: none;
}

/* RESPONSIVIDADE */
@media (max-width: 900px){

    body{
        flex-direction: column;
    }

    .sidebar{
        width: 100%;
        height: auto;
    }

    .sidebar h1{
        font-size: 1.5rem;
    }

    .main{
        height: 70vh;
    }
}

</style>

<script>

function abrirJogo(url){

    const container = document.getElementById("jogo");

    container.innerHTML = `
        <iframe src="${url}"></iframe>
    `;
}

</script>

<!-- MENU LATERAL -->

</head>

<body>

<div class="sidebar">

    <h1>MEUS JOGOS</h1>

    <button onclick="abrirJogo('amogus/amogus.html')">
        Amogus
    </button>

    <button onclick="abrirJogo('nave/nave.html')">
        Nave Espacial
    </button>

    <button onclick="abrirJogo('sapo/sapo.html')">
        Sapo
    </button>

    <button onclick="abrirJogo('velha/jogo_da_velha.html')">
        Jogo da Velha
    </button>

    <button onclick="abrirJogo('transformador/transformador.html')">
        Transformador de Imagens
    </button>

    <button onclick="abrirJogo('qrcode/gerador_de_qrcode.html')">
        Gerador de QRCode
    </button>

</div>

<div class="main">

    <div class="game-container" id="jogo">

    </div>

</div>

</body>
</html>
