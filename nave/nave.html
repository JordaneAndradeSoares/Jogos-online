<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Nave Espacial ONLINE</title>

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

canvas {
    background: #000510;
    border: 2px solid #444;
    width: 100%;
    max-width: 800px;
    height: auto;
    cursor: none;
}

</style>
</head>

<body>

<canvas id="game" width="800" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Detecta celular
const celular =
    /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

// Configurações
const LARGURA = 800;
const ALTURA = 400;

let jogando = false;
let pontos = 0;
let gameFrame = 0;

// Nave
const nave = {
    x: 50,
    y: 200,
    largura: 50,
    altura: 30,
    cor: "#00d4ff"
};

// Asteroides
const asteroides = [];

// MOUSE (PC)
window.addEventListener("mousemove", (e) => {

    const rect = canvas.getBoundingClientRect();

    const mouseY =
        (e.clientY - rect.top) *
        (ALTURA / rect.height);

    nave.y = mouseY - nave.altura / 2;
});

// TOQUE (CELULAR)
window.addEventListener("touchstart", (e) => {

    if (!jogando) {

        jogando = true;

        pontos = 0;

        asteroides.length = 0;
    }

    const rect = canvas.getBoundingClientRect();

    const touchY =
        (e.touches[0].clientY - rect.top) *
        (ALTURA / rect.height);

    nave.y = touchY - nave.altura / 2;

}, { passive: false });

window.addEventListener("touchmove", (e) => {

    const rect = canvas.getBoundingClientRect();

    const touchY =
        (e.touches[0].clientY - rect.top) *
        (ALTURA / rect.height);

    nave.y = touchY - nave.altura / 2;

}, { passive: false });

// CLICK (PC)
canvas.addEventListener("click", () => {

    if (!jogando) {

        jogando = true;

        pontos = 0;

        asteroides.length = 0;
    }
});

function spawnAsteroide() {

    const tamanho = Math.random() * 40 + 20;

    asteroides.push({

        x: LARGURA,

        y: Math.random() * (ALTURA - tamanho),

        tamanho: tamanho,

        velocidade:
            Math.random() * 4 + 3 + (pontos / 10)
    });
}

function loop() {

    ctx.clearRect(0, 0, LARGURA, ALTURA);

    // Fundo estrelado
    ctx.fillStyle = "white";

    for (let i = 0; i < 5; i++) {

        ctx.fillRect(
            Math.random() * LARGURA,
            Math.random() * ALTURA,
            2,
            2
        );
    }

    if (jogando) {

        // Nave
        ctx.fillStyle = nave.cor;

        ctx.beginPath();

        ctx.moveTo(nave.x, nave.y);

        ctx.lineTo(
            nave.x + nave.largura,
            nave.y + nave.altura / 2
        );

        ctx.lineTo(
            nave.x,
            nave.y + nave.altura
        );

        ctx.closePath();

        ctx.fill();

        // Asteroides
        if (gameFrame % 60 === 0) {
            spawnAsteroide();
        }

        for (let i = asteroides.length - 1; i >= 0; i--) {

            const a = asteroides[i];

            a.x -= a.velocidade;

            // Desenha asteroide
            ctx.fillStyle = "#888";

            ctx.beginPath();

            ctx.arc(
                a.x,
                a.y + a.tamanho / 2,
                a.tamanho / 2,
                0,
                Math.PI * 2
            );

            ctx.fill();

            // Colisão
            if (

                nave.x < a.x + a.tamanho / 2 &&
                nave.x + nave.largura > a.x - a.tamanho / 2 &&
                nave.y < a.y + a.tamanho &&
                nave.y + nave.altura > a.y

            ) {

                jogando = false;
            }

            // Remove
            if (a.x + a.tamanho < 0) {

                asteroides.splice(i, 1);

                pontos++;
            }
        }

        // Pontos
        ctx.fillStyle = "white";

        ctx.font = "20px Arial";

        ctx.fillText(
            "Pontos: " + pontos,
            20,
            30
        );

        gameFrame++;

    } else {

        ctx.fillStyle = "white";

        ctx.textAlign = "center";

        ctx.font = "30px Arial";

        ctx.fillText(
            "NAVE ESPACIAL",
            LARGURA / 2,
            150
        );

        ctx.font = "20px Arial";

        // MENSAGENS DIFERENTES
        if (celular) {

            ctx.fillText(
                "TOQUE para iniciar",
                LARGURA / 2,
                200
            );

            ctx.fillText(
                "Mova o dedo para desviar",
                LARGURA / 2,
                240
            );

        } else {

            ctx.fillText(
                "CLIQUE para iniciar",
                LARGURA / 2,
                200
            );

            ctx.fillText(
                "Mova o mouse para desviar",
                LARGURA / 2,
                240
            );
        }

        // Pontuação final
        if (pontos > 0) {

            ctx.fillText(
                "Pontuação Final: " + pontos,
                LARGURA / 2,
                280
            );
        }

        ctx.textAlign = "start";
    }

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
