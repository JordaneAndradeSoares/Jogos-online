<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Damas Responsivo</title>

<style>

body{
    margin:0;
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

canvas{
    background:black;
    border:4px solid #555;
    max-width:95vw;
    max-height:95vh;
    touch-action: manipulation;
}

</style>
</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const WIDTH = 720;
const HEIGHT = 720;

function ajustarCanvas(){

    const tamanho = Math.min(
        window.innerWidth * 0.95,
        window.innerHeight * 0.95
    );

    canvas.style.width = tamanho + "px";
    canvas.style.height = tamanho + "px";

    canvas.width = WIDTH;
    canvas.height = HEIGHT;
}

ajustarCanvas();

window.addEventListener(
    "resize",
    ajustarCanvas
);

const SQUARE = WIDTH / 8;

const LIGHT = "#f0d9b5";
const DARK = "#b58863";
const HIGHLIGHT = "yellow";
const SELECT = "#00c8ff";
const RED = "#dc1414";
const BLACK = "#1e1e1e";
const CROWN = "gold";
const MANDATORY = "#ff3232";

const ROWS = 8;
const COLS = 8;

function inBounds(r,c){

    return r >= 0 &&
           r < ROWS &&
           c >= 0 &&
           c < COLS;
}

class Damas{

    constructor(){

        this.reset();

        requestAnimationFrame(
            ()=>this.loop()
        );
    }

    reset(){

        this.board = [];

        for(let r=0;r<ROWS;r++){

            this.board[r] = [];

            for(let c=0;c<COLS;c++){

                this.board[r][c] = null;
            }
        }

        // pretas
        for(let r=0;r<3;r++){

            for(let c=0;c<COLS;c++){

                if((r+c)%2===1){

                    this.board[r][c] = "b";
                }
            }
        }

        // vermelhas
        for(let r=5;r<8;r++){

            for(let c=0;c<COLS;c++){

                if((r+c)%2===1){

                    this.board[r][c] = "r";
                }
            }
        }

        this.turnRed = true;

        this.selected = null;

        this.validMoves = {};

        this.mustCapture = false;

        this.gameOver = false;

        this.winner = null;

        this.findAllMoves();
    }

    draw(){

        for(let r=0;r<ROWS;r++){

            for(let c=0;c<COLS;c++){

                ctx.fillStyle =
                    (r+c)%2===0
                    ? LIGHT
                    : DARK;

                ctx.fillRect(
                    c*SQUARE,
                    r*SQUARE,
                    SQUARE,
                    SQUARE
                );

                // captura obrigatória
                if(
                    this.mustCapture &&
                    this.validMoves[`${r},${c}`]
                ){

                    ctx.strokeStyle = MANDATORY;
                    ctx.lineWidth = 4;

                    ctx.strokeRect(
                        c*SQUARE,
                        r*SQUARE,
                        SQUARE,
                        SQUARE
                    );
                }

                // seleção
                if(
                    this.selected &&
                    this.selected[0]===r &&
                    this.selected[1]===c
                ){

                    ctx.strokeStyle = SELECT;
                    ctx.lineWidth = 4;

                    ctx.strokeRect(
                        c*SQUARE,
                        r*SQUARE,
                        SQUARE,
                        SQUARE
                    );
                }

                // highlights
                if(this.selected){

                    const moves =
                        this.validMoves[
                            `${this.selected[0]},${this.selected[1]}`
                        ] || [];

                    for(let m of moves){

                        if(m[0]===r && m[1]===c){

                            ctx.strokeStyle = HIGHLIGHT;
                            ctx.lineWidth = 4;

                            ctx.strokeRect(
                                c*SQUARE,
                                r*SQUARE,
                                SQUARE,
                                SQUARE
                            );
                        }
                    }
                }

                const piece = this.board[r][c];

                if(piece){

                    this.drawPiece(r,c,piece);
                }
            }
        }

        // texto
        ctx.fillStyle = "white";

        ctx.font = "20px Arial";

        ctx.fillText(
            `Vez: ${
                this.turnRed
                ? "VERMELHO"
                : "PRETO"
            } | R = reset`,
            10,
            HEIGHT - 10
        );

        // fim de jogo
        if(this.gameOver){

            ctx.fillStyle =
                "rgba(0,0,0,0.6)";

            ctx.fillRect(
                0,
                0,
                WIDTH,
                HEIGHT
            );

            ctx.fillStyle = "white";

            ctx.font = "40px Arial";

            ctx.textAlign = "center";

            ctx.fillText(
                `Vencedor: ${this.winner}`,
                WIDTH/2,
                HEIGHT/2
            );

            ctx.font = "25px Arial";

            ctx.fillText(
                "Pressione R para reiniciar",
                WIDTH/2,
                HEIGHT/2 + 50
            );

            ctx.textAlign = "start";
        }
    }

    drawPiece(r,c,piece){

        const x =
            c*SQUARE + SQUARE/2;

        const y =
            r*SQUARE + SQUARE/2;

        ctx.fillStyle =
            piece.toLowerCase()==="r"
            ? RED
            : BLACK;

        ctx.beginPath();

        ctx.arc(
            x,
            y,
            SQUARE/3,
            0,
            Math.PI*2
        );

        ctx.fill();

        // rei
        if(piece === piece.toUpperCase()){

            ctx.fillStyle = CROWN;

            ctx.beginPath();

            ctx.arc(
                x,
                y,
                SQUARE/6,
                0,
                Math.PI*2
            );

            ctx.fill();
        }
    }

    click(x,y){

        if(this.gameOver) return;

        const r =
            Math.floor(y/SQUARE);

        const c =
            Math.floor(x/SQUARE);

        if(!inBounds(r,c)) return;

        // mover
        if(this.selected){

            const moves =
                this.validMoves[
                    `${this.selected[0]},${this.selected[1]}`
                ] || [];

            for(let m of moves){

                if(m[0]===r && m[1]===c){

                    this.makeMove(
                        this.selected,
                        [r,c]
                    );

                    return;
                }
            }

            this.selected = null;
        }

        const piece =
            this.board[r][c];

        if(!piece) return;

        if(
            (
                this.turnRed &&
                piece.toLowerCase()==="r"
            )
            ||
            (
                !this.turnRed &&
                piece.toLowerCase()==="b"
            )
        ){

            const key = `${r},${c}`;

            if(this.validMoves[key]){

                this.selected = [r,c];
            }
        }
    }

    findAllMoves(){

        this.validMoves = {};

        this.mustCapture = false;

        for(let r=0;r<ROWS;r++){

            for(let c=0;c<COLS;c++){

                const piece =
                    this.board[r][c];

                if(!piece) continue;

                if(
                    (
                        this.turnRed &&
                        piece.toLowerCase()==="r"
                    )
                    ||
                    (
                        !this.turnRed &&
                        piece.toLowerCase()==="b"
                    )
                ){

                    const [moves,caps] =
                        this.getPieceMoves(r,c);

                    if(caps.length){

                        this.validMoves[
                            `${r},${c}`
                        ] = caps;

                        this.mustCapture = true;

                    }else if(moves.length){

                        this.validMoves[
                            `${r},${c}`
                        ] = moves;
                    }
                }
            }
        }

        // captura obrigatória
        if(this.mustCapture){

            for(let k in this.validMoves){

                const row =
                    parseInt(k.split(",")[0]);

                const caps =
                    this.validMoves[k].filter(
                        m =>
                        Math.abs(m[0]-row)===2
                    );

                if(caps.length){

                    this.validMoves[k] = caps;

                }else{

                    delete this.validMoves[k];
                }
            }
        }

        // sem movimentos
        if(
            Object.keys(this.validMoves)
            .length===0
        ){

            this.gameOver = true;

            this.winner =
                this.turnRed
                ? "PRETO"
                : "VERMELHO";
        }
    }

    getPieceMoves(r,c){

        const piece =
            this.board[r][c];

        let directions = [];

        if(piece==="r"){

            directions = [
                [-1,-1],
                [-1,1]
            ];

        }else if(piece==="b"){

            directions = [
                [1,-1],
                [1,1]
            ];

        }else{

            directions = [
                [-1,-1],
                [-1,1],
                [1,-1],
                [1,1]
            ];
        }

        const moves = [];
        const captures = [];

        for(let d of directions){

            const nr = r + d[0];
            const nc = c + d[1];

            // movimento
            if(
                inBounds(nr,nc) &&
                this.board[nr][nc]===null
            ){

                moves.push([nr,nc]);
            }

            // captura
            else if(
                inBounds(nr,nc) &&
                this.board[nr][nc]!==null
            ){

                if(
                    this.board[nr][nc]
                    .toLowerCase()
                    !==
                    piece.toLowerCase()
                ){

                    const jr =
                        nr + d[0];

                    const jc =
                        nc + d[1];

                    if(
                        inBounds(jr,jc) &&
                        this.board[jr][jc]===null
                    ){

                        captures.push([jr,jc]);
                    }
                }
            }
        }

        return [moves,captures];
    }

    makeMove(fr,to){

        let piece =
            this.board[fr[0]][fr[1]];

        let capture = false;

        // captura
        if(
            Math.abs(to[0]-fr[0])===2
        ){

            const mr =
                (fr[0]+to[0])/2;

            const mc =
                (fr[1]+to[1])/2;

            this.board[mr][mc] = null;

            capture = true;
        }

        // mover
        this.board[fr[0]][fr[1]] =
            null;

        this.board[to[0]][to[1]] =
            piece;

        // promoção
        if(piece==="r" && to[0]===0){

            this.board[to[0]][to[1]] =
                "R";
        }

        if(piece==="b" && to[0]===7){

            this.board[to[0]][to[1]] =
                "B";
        }

        // múltiplas capturas
        if(capture){

            const [m,caps] =
                this.getPieceMoves(
                    to[0],
                    to[1]
                );

            if(caps.length){

                this.validMoves = {};

                this.validMoves[
                    `${to[0]},${to[1]}`
                ] = caps;

                this.selected = to;

                return;
            }
        }

        this.selected = null;

        this.turnRed =
            !this.turnRed;

        this.findAllMoves();
    }

    loop(){

        ctx.clearRect(
            0,
            0,
            WIDTH,
            HEIGHT
        );

        this.draw();

        requestAnimationFrame(
            ()=>this.loop()
        );
    }
}

const jogo = new Damas();

// clique
canvas.addEventListener("click",(e)=>{

    const rect =
        canvas.getBoundingClientRect();

    const x =
        (e.clientX - rect.left) *
        (WIDTH / rect.width);

    const y =
        (e.clientY - rect.top) *
        (HEIGHT / rect.height);

    jogo.click(x,y);
});

// toque
canvas.addEventListener("touchstart",(e)=>{

    e.preventDefault();

    const rect =
        canvas.getBoundingClientRect();

    const touch =
        e.touches[0];

    const x =
        (touch.clientX - rect.left) *
        (WIDTH / rect.width);

    const y =
        (touch.clientY - rect.top) *
        (HEIGHT / rect.height);

    jogo.click(x,y);

}, { passive:false });

// reset
window.addEventListener(
    "keydown",
    (e)=>{

        if(
            e.key.toLowerCase()==="r"
        ){

            jogo.reset();
        }
    }
);

</script>

</body>
</html>
